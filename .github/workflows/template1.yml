on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: ${{ inputs.node-version }}
        - name: Run npm test
          if: hashFiles('package.json') != ''
          run: npm test
        - name: Run dotnet test
          if: hashFiles('*.csproj') != ''
          run: dotnet test
